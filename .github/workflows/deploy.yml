name: CI/CD — Build & Deploy

on:
  push:
    branches:
      - main        # Triggers on every push to main
  workflow_dispatch: # Also allows manual trigger from GitHub UI

jobs:
  # ============================================
  # JOB 1 — Test backend
  # ============================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test --if-present   # Won't fail if no test script defined yet
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  # ============================================
  # JOB 2 — Test frontend
  # ============================================
  test-frontend:
    name: Test & Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test --if-present --watchAll=false

      - name: Build frontend (verify it compiles)
        working-directory: frontend
        run: npm run build

  # ============================================
  # JOB 3 — Deploy to VPS
  # Runs only after both test jobs pass
  # ============================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]  # Both must pass first

    # Only deploy from main branch (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "==> Navigating to app directory"
            cd /opt/mern-app

            echo "==> Pulling latest code from GitHub"
            git pull origin main

            echo "==> Rebuilding and restarting containers"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

            echo "==> Removing unused Docker images (cleanup)"
            docker image prune -f

            echo "==> Running containers:"
            docker compose ps

            echo "✅ Deployment complete!"

      - name: Notify success
        if: success()
        run: echo "🚀 Deployed to https://iaaccampus.com successfully"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed — check the logs above"
